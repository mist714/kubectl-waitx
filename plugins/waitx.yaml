apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: waitx
spec:
  version: "v0.0.4"
  homepage: https://github.com/mist714/kubectl-waitx
  shortDescription: Better completion for kubectl wait
  description: |
    kubectl-waitx improves shell completion for kubectl wait,
    especially around --for values and condition names.
  caveats: |
    After installing with krew, point kubectl_complete-waitx at the same binary:

      ln -sf kubectl-waitx "${KREW_ROOT:-$HOME/.krew}/bin/kubectl_complete-waitx"
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.4/kubectl-waitx_0.0.4_darwin_amd64.tar.gz
    sha256: 7505a7264771daf139e4a41fd3e78f46942147458299ff9a911cffef0d327264
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.4/kubectl-waitx_0.0.4_darwin_arm64.tar.gz
    sha256: 822beb2e5f540eba7c6a4f3e4642c3ec94c376e24d655831b529002102caba4c
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.4/kubectl-waitx_0.0.4_linux_amd64.tar.gz
    sha256: e68f7d4226d367e6bf9ccf876ecd933d634fb87ab53f6dfec1633f0a41827b1e
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.4/kubectl-waitx_0.0.4_linux_arm64.tar.gz
    sha256: f9bc82833a77bf6022c7da491f28bd483612ef9689e7ca28468171b9d6ec21ae
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx
