apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: waitx
spec:
  version: "v0.0.5"
  homepage: https://github.com/mist714/kubectl-waitx
  shortDescription: Better completion for kubectl wait
  description: |
    kubectl-waitx improves shell completion for kubectl wait,
    especially around --for values and condition names.
  caveats: |
    After installing with krew, point kubectl_complete-waitx at the same binary:

      ln -sf kubectl-waitx "${KREW_ROOT:-/home/runner/.krew}/bin/kubectl_complete-waitx"
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.5/kubectl-waitx_0.0.5_darwin_amd64.tar.gz
    sha256: 3ed062989d6268fc9f829cc11956a75ef5b33966939852a0d6c56316335e482b
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.5/kubectl-waitx_0.0.5_darwin_arm64.tar.gz
    sha256: a346980b20728e2da807caea25e0fc98be55ed4f051d2141fa16675de2362876
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.5/kubectl-waitx_0.0.5_linux_amd64.tar.gz
    sha256: 365f0b432ec961a1471a32c29cc609f303ea25f9e463198a51f5bd322dde7e01
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx

  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mist714/kubectl-waitx/releases/download/v0.0.5/kubectl-waitx_0.0.5_linux_arm64.tar.gz
    sha256: 34121814ef5ae96c4687aa8d897b996102e6e1667de41322e149a00837319e4c
    files:
      - from: kubectl-waitx
        to: .
    bin: kubectl-waitx
