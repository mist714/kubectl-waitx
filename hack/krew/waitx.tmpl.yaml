apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: waitx
spec:
  version: "${TAG}"
  homepage: https://github.com/${REPO}
  shortDescription: Better completion for kubectl wait
  description: |
    kubectl-waitx improves shell completion for kubectl wait,
    especially around --for values and condition names.
  caveats: |
    Krew exposes kubectl-waitx on PATH, but kubectl plugin completion also
    needs kubectl_complete-waitx. Link the bundled helper script after install:

      version="$(ls "${HOME}/.krew/store/waitx" | sort -V | tail -1)"
      ln -sf \
        "${HOME}/.krew/store/waitx/${version}/kubectl_complete-waitx" \
        "${HOME}/.krew/bin/kubectl_complete-waitx"
  platforms:
${PLATFORMS}
