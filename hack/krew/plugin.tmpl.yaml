apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: waitx
spec:
  version: v${VERSION}
  homepage: ${HOMEPAGE}
  shortDescription: Better completion for kubectl wait
  description: |
    kubectl-waitx improves shell completion for kubectl wait,
    especially around --for values and condition names.
  caveats: |
    After installing with krew, point kubectl_complete-waitx at the same binary:

      ln -sf kubectl-waitx "${KREW_ROOT:-$HOME/.krew}/bin/kubectl_complete-waitx"
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: ${HOMEPAGE}/releases/download/v${VERSION}/kubectl-waitx_${VERSION}_darwin_amd64.tar.gz
      sha256: ${SHA_DARWIN_AMD64}
      bin: kubectl-waitx
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: ${HOMEPAGE}/releases/download/v${VERSION}/kubectl-waitx_${VERSION}_darwin_arm64.tar.gz
      sha256: ${SHA_DARWIN_ARM64}
      bin: kubectl-waitx
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: ${HOMEPAGE}/releases/download/v${VERSION}/kubectl-waitx_${VERSION}_linux_amd64.tar.gz
      sha256: ${SHA_LINUX_AMD64}
      bin: kubectl-waitx
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: ${HOMEPAGE}/releases/download/v${VERSION}/kubectl-waitx_${VERSION}_linux_arm64.tar.gz
      sha256: ${SHA_LINUX_ARM64}
      bin: kubectl-waitx
