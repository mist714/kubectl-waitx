version: 2

project_name: kubectl-waitx

builds:
  - id: kubectl_complete-waitx
    main: .
    binary: kubectl_complete-waitx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - builds:
      - kubectl_complete-waitx
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - src: kubectl-waitx
        dst: kubectl-waitx

checksum:
  name_template: checksums.txt
