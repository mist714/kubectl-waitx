version: 2

project_name: kubectl-waitx

builds:
  - id: kubectl-waitx
    main: .
    binary: kubectl-waitx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - builds:
      - kubectl-waitx
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - src: kubectl_complete-waitx
        dst: kubectl_complete-waitx

checksum:
  name_template: checksums.txt
