version: 2

project_name: kubectl-waitx

builds:
  - id: kubectl-waitx
    main: .
    binary: kubectl-waitx
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - ids:
      - kubectl-waitx
    formats:
      - binary

checksum:
  name_template: checksums.txt
